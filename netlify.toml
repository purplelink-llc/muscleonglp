[build]
  publish = "."

[functions]
  directory = "netlify/functions"

# The purchasable PDFs are not deployed with the site at all: they live in the
# `guide-files` Netlify Blobs store and are streamed by download.mjs only after
# it verifies a paid session and a recorded Terms acceptance. Keep this 404 so
# any stale link to the old location cannot resolve.
[[redirects]]
  from = "/private/*"
  to = "/terms/"
  status = 404
  force = true

# Old public PDF paths, in case anything still links them.
[[redirects]]
  from = "/assets/*.pdf"
  to = "/terms/"
  status = 404
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # AdSense exception (owner-authorized, 2026-07-15): Google ad origins added to
    # img/script/connect/frame + 'unsafe-inline' on script-src (AdSense injects
    # inline scripts). Mirrors purplelink's policy. Relaxes muscleonglp's strict
    # script-src; the tradeoff was accepted to serve ads. Ads do not render until
    # getmuscleonglp.com is added + approved in the AdSense console.
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net https://www.google.com https://www.gstatic.com https://www.google-analytics.com; script-src 'self' 'unsafe-inline' https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net https://www.googletagservices.com https://tpc.googlesyndication.com https://www.googletagmanager.com; connect-src 'self' https://pagead2.googlesyndication.com https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com https://www.googletagmanager.com; frame-src 'self' blob: https://googleads.g.doubleclick.net https://tpc.googlesyndication.com; object-src 'self' blob:"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=604800"

# Purchased files must never be cached by shared caches.
[[headers]]
  for = "/.netlify/functions/download"
  [headers.values]
    Cache-Control = "private, no-store"
