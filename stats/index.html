<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stats — MuscleOnGLP</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="/assets/favicon.png">
<link rel="stylesheet" href="/styles.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6407975157274256" crossorigin="anonymous"></script>
</head>
<body>

<header class="nav">
  <div class="wrap nav-inner">
    <a class="brand" href="/"><span class="brand-mark">M</span> MuscleOnGLP</a>
  </div>
</header>

<main>
<section class="section">
  <div class="wrap" style="max-width:820px">
    <h2>How the site is doing</h2>
    <p class="lead">Paste your token to load the numbers. Only you can see this page, and visitors are counted without cookies.</p>
    <form id="tokform" class="subscribe-form" style="justify-content:flex-start" novalidate>
      <input type="password" id="tok" placeholder="Your token" aria-label="Stats token" autocomplete="off" style="flex:1 1 260px">
      <select id="days" aria-label="Days" style="flex:0 0 auto;padding:15px 18px;border:1.5px solid var(--line);border-radius:100px;background:#fff;color:var(--ink);font:inherit">
        <option value="7">Last 7 days</option>
        <option value="14" selected>Last 14 days</option>
        <option value="30">Last 30 days</option>
        <option value="90">Last 90 days</option>
      </select>
      <button type="submit" class="btn btn-primary">Load</button>
      <p id="msg" class="subscribe-status" role="status" aria-live="polite"></p>
    </form>
    <div id="out"></div>
  </div>
</section>
</main>

<footer>
  <div class="wrap">
    <div class="foot-legal"><span>&copy; 2026 MuscleOnGLP. Internal.</span></div>
  </div>
</footer>

<script src="/stats/stats.js"></script>
</body>
</html>
